- name: Build debug APK
  run: |
    buildozer -v android debug 2>&1 | tee buildozer.log

- name: Debug output folders
  if: always()
  run: |
    echo "PWD=$(pwd)"
    echo "===== bin ====="
    ls -lah bin || true
    echo "===== find apk/aab ====="
    find . -type f $$ -name "*.apk" -o -name "*.aab" $$ | sort || true
    echo "===== last 200 lines of buildozer.log ====="
    tail -n 200 buildozer.log || true

- name: Upload APK artifact
  if: success()
  uses: actions/upload-artifact@v4
  with:
    name: apk
    path: |
      bin/*.apk
      bin/*.aab
    if-no-files-found: error

- name: Upload build logs
  if: always()
  uses: actions/upload-artifact@v4
  with:
    name: build-logs
    path: |
      buildozer.log
      .buildozer/**
    if-no-files-found: warn
