name: Build APK (ID Check)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
      BUILDOZER_WARN_ON_ROOT: "0"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Buildozer and Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec', 'requirements.txt', '.github/workflows/build.yml') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y             git zip unzip openjdk-17-jdk python3-pip python3-virtualenv             autoconf automake autopoint libtool pkg-config gettext             zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6             cmake libffi-dev libssl-dev ccache

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --upgrade buildozer Cython==0.29.33 virtualenv

      - name: Validate required project files
        run: |
          test -f buildozer.spec
          test -f main.py
          test -d app
          if [ ! -f assets/fonts/Cairo-Regular.ttf ]; then
            echo "Missing font file: assets/fonts/Cairo-Regular.ttf"
            exit 1
          fi

      - name: Show tool versions
        run: |
          java -version
          python --version
          buildozer --version

      - name: Clean previous local build state
        run: |
          buildozer android clean || true

      - name: Build debug APK
        run: |
          buildozer -v android debug

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: |
            bin/*.apk
            ./.buildozer/android/platform/build-*/dists/*/*.apk
          if-no-files-found: warn

      - name: Upload logs and build state on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            .buildozer/
            *.log
          if-no-files-found: warn
